<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login Admin - INKATECH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--bg:#0f1f3d;--card:#162a4f;--yellow:#f5c542;--cyan:#36b5e6;--line:#2c4a7a;--text:#fff;--muted:#cbd5e1;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial;}
    .wrap{max-width:420px;margin:60px auto;padding:18px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25);}
    h1{margin:0 0 10px 0;color:var(--yellow);}
    label{display:block;margin-top:12px;color:var(--muted);}
    input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);margin-top:6px;}
    button{margin-top:14px;width:100%;padding:12px;border-radius:12px;border:none;background:var(--cyan);color:#062033;font-weight:bold;cursor:pointer;}
    .err{margin-top:10px;color:#ff6b6b;}
    a{color:var(--cyan);text-decoration:none;display:inline-block;margin-top:12px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin Login</h1>
      <form method="post" action="/login">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="Escribe tu contraseña" required>
        <button type="submit">Entrar</button>
      </form>

      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}

      <a href="/">← Volver al catálogo</a>
    </div>
  </div>
</body>
</html>

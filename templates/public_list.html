<!DOCTYPE html>
<a href="/login">Admin</a>
<html>
<head>
  <meta charset="utf-8">
  <title>INKATECH Robotics - Catálogo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#0f1f3d;
      --card:#162a4f;
      --yellow:#f5c542;
      --cyan:#36b5e6;
      --line:#2c4a7a;
      --text:#ffffff;
      --muted:#cbd5e1;
    }

    body{ margin:0; background:var(--bg); color:var(--text); font-family:Arial, sans-serif; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px;
      border-bottom:1px solid var(--line);
      background:rgba(0,0,0,0.18);
    }

    .brand{ display:flex; align-items:center; gap:12px; }
    .brand img{ height:44px; width:auto; display:block; }
    .brand .name{ color:var(--yellow); font-weight:bold; letter-spacing:1px; }

    a{ color:var(--cyan); text-decoration:none; }

    .container{ max-width:1100px; margin:0 auto; padding:22px; }

    h1{ margin:0 0 16px 0; color:var(--yellow); }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:16px;
    }

    @media (max-width: 950px){ .grid{ grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 600px){ .grid{ grid-template-columns: 1fr;} .brand .name{display:none;} }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      box-shadow:0 12px 30px rgba(0,0,0,0.25);
    }

    .robot-name{ font-size:18px; font-weight:bold; color:var(--yellow); margin:0 0 6px 0; }
    .meta{ color:var(--muted); line-height:1.6; }
    .price{ margin-top:10px; color:var(--cyan); font-weight:bold; font-size:18px; }

    .thumb{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      margin-bottom:12px;
      display:block;
    }

    .btn{
      display:inline-block;
      margin-top:12px;
      padding:10px 14px;
      border-radius:12px;
      background:var(--cyan);
      color:#062033;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="brand">
      <!-- LOGO: sube tu logo como static/logo.jpg -->
      <img src="/static/logo.jpg" alt="INKATECH Robotics">
      <div class="name">INKATECH ROBOTICS</div>
    </div>

    <div>
      <a href="/admin?token=TU_TOKEN_AQUI">Admin</a>
    </div>
  </div>

  <div class="container">
    <h1>Catálogo de Robots</h1>

    <div class="grid">
      {% for r in robots %}
        <div class="card">
          {% if r.imagen %}
            <img class="thumb" src="/uploads/{{ r.imagen }}" alt="{{ r.nombre }}">
          {% else %}
            <img class="thumb" src="/static/logo.jpg" alt="Sin imagen">
          {% endif %}

          <p class="robot-name">{{ r.nombre }}</p>
          <div class="meta">Modelo: {{ r.modelo }}</div>
          <div class="meta">Fabricante: {{ r.fabricante }}</div>
          <div class="price">$ {{ r.precio }}</div>

          <a class="btn" href="/robot/{{ r.id }}">Ver robot</a>
        </div>
      {% endfor %}
    </div>
  </div>

</body>
</html>

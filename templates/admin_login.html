<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - INKATECH Robotics</title>
    <style>
        body{
            background:#0b0f1a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#121a2b;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        input{
            padding:10px;
            width:220px;
            margin-top:15px;
            border-radius:5px;
            border:none;
        }

        button{
            margin-top:20px;
            padding:10px 25px;
            background:#00c3ff;
            border:none;
            border-radius:5px;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#0098c7;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <form method="post" action="/admin/login">

        <input 
            type="password" 
            name="password" 
            placeholder="Enter admin password"
            required
        >

        <br>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
